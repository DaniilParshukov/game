<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Копилка — игра</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 { 
            text-align: center;
            color: #2c3e50;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            padding: 16px;
            background: #ecf0f1;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .balance { font-size: 1.4rem; font-weight: bold; color: #2c3e50; }
        .day { font-size: 1.1rem; color: #34495e; }
        .panel {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .panel-left, .panel-right {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 16px;
        }
        .panel h3 {
            margin-bottom: 12px;
            color: #2c3e50;
        }
        .portfolio {
            min-height: 100px;
        }
        .portfolio table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        .portfolio th, .portfolio td {
            padding: 6px 8px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        .portfolio th {
            background: #e9ecef;
            font-weight: 600;
        }
        .empty-portfolio {
            color: #95a5a6;
            text-align: center;
            padding: 20px 0;
        }
        .empty-log {
            color: #95a5a6;
            text-align: center;
            padding: 10px 0;
        }
        .log ul {
            list-style: none;
            font-size: 0.85rem;
        }
        .log li {
            padding: 4px 0;
            border-bottom: 1px solid #eee;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin: 16px 0;
            padding: 16px;
            background: #eaf4f4;
            border-radius: 10px;
        }
        .controls input {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.95rem;
            width: 100px;
        }
        .controls input#tickerInput {
            width: 80px;
        }
        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { transform: translateY(-1px); opacity: 0.9; }
        .btn-primary { background: #3498db; color: white; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-warning { background: #f39c12; color: white; }
        .btn-secondary { background: #95a5a6; color: white; }
        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .footer-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e0e0e0;
        }
        @media (max-width: 700px) {
            .panel { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏦 Копилка</h1>
        <p class="subtitle">Инвестиционный симулятор</p>
        
        <div class="header">
            <div class="balance" id="balance">💰 0 руб.</div>
            <div class="day" id="day">📅 День 0 из 365</div>
        </div>
        
        <div class="panel">
            <div class="panel-left">
                <h3>📊 Мой портфель</h3>
                <div class="portfolio" id="portfolio">
                    <div class="empty-portfolio">Загрузка...</div>
                </div>
            </div>
            <div class="panel-right">
                <h3>📝 История</h3>
                <div class="log" id="log">
                    <div class="empty-log">Нет операций</div>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <label>📈 Тикер:</label>
            <input type="text" id="tickerInput" placeholder="SBER" maxlength="10">
            <label>Кол-во:</label>
            <input type="number" id="amountInput" placeholder="10" min="1" value="10">
            <div class="btn-group">
                <button class="btn btn-success" id="buy">🟢 Купить</button>
                <button class="btn btn-danger" id="sell">🔴 Продать</button>
            </div>
            <span style="color:#7f8c8d; font-size:0.85rem; margin-left:4px;">
                (доступны: SBER, GAZP, YNDX, OZFZ, GOLD)
            </span>
        </div>
        
        <div class="footer-actions">
            <button class="btn btn-primary" id="nextDay">➡️ Следующий день</button>
            <button class="btn btn-secondary" id="reset">🔄 Сбросить</button>
        </div>
    </div>
    
    <script type="module" src="script.js"></script>
</body>
</html>
