<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инвестиционный симулятор</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #07111f;
            --panel: rgba(10, 19, 34, 0.9);
            --panel-2: rgba(17, 30, 54, 0.95);
            --border: rgba(255,255,255,0.08);
            --text: #f4f6fb;
            --muted: #8fa0bd;
            --accent: #3b82f6;
            --accent-2: #2dd4bf;
            --danger: #ff4d6d;
            --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top left, #14345d 0%, var(--bg) 42%, #050b14 100%);
            padding: 24px;
            overflow-x: hidden;
        }

        .app-shell {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-height: calc(100vh - 48px);
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 20px 24px;
            border: 1px solid var(--border);
            border-radius: 24px;
            background: var(--panel);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }

        .cash-pill {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .label {
            font-size: 0.76rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .cash-value {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .secondary {
            color: var(--muted);
            font-size: 0.95rem;
        }

        .btn {
            border: none;
            border-radius: 999px;
            padding: 10px 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            color: white;
            background: linear-gradient(135deg, var(--accent), #5b93ff);
            box-shadow: 0 12px 24px rgba(59, 130, 246, 0.28);
        }

        .btn-secondary {
            color: var(--text);
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
        }

        .btn-muted {
            color: var(--muted);
            background: transparent;
            border: 1px solid var(--border);
        }

        .asset-section {
            border: 1px solid var(--border);
            border-radius: 24px;
            background: var(--panel);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
            padding: 24px;
            flex: 1 1 auto;
            min-height: 0;
        }

        .asset-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            gap: 12px;
        }

        .asset-header h2 {
            margin: 0 0 4px;
            font-size: 1.15rem;
        }

        .asset-header p {
            margin: 0;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .day-pill {
            color: var(--muted);
            font-size: 0.95rem;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255,255,255,0.05);
        }

        .asset-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 240px), 1fr));
            gap: 14px;
            align-content: start;
            height: 100%;
            min-height: 0;
        }

        .instrument-card {
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: clamp(12px, 1.2vw, 16px);
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: linear-gradient(135deg, rgba(59,130,246,0.16), rgba(45,212,191,0.08));
            transition: transform 0.2s ease, border-color 0.2s ease;
            min-height: 0;
            transform: scale(1);
            font-size: clamp(0.9rem, 0.95vw, 1rem);
        }

        .instrument-card:hover {
            transform: translateY(-2px);
            border-color: rgba(59,130,246,0.35);
        }

        .instrument-head {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            align-items: flex-start;
        }

        .instrument-name {
            font-size: 1rem;
            font-weight: 700;
        }

        .instrument-ticker {
            margin-top: 2px;
            font-size: 0.78rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .instrument-pill {
            font-size: 0.77rem;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(255,255,255,0.07);
            color: var(--muted);
            white-space: nowrap;
        }

        .instrument-price-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 10px;
        }

        .price-value {
            font-size: clamp(1rem, 1.1vw, 1.2rem);
            font-weight: 700;
        }

        .price-value.up { color: #2dd4bf; }
        .price-value.down { color: #ff4d6d; }

        .price-change {
            font-size: clamp(0.78rem, 0.86vw, 0.9rem);
            font-weight: 600;
        }

        .price-change.up { color: #2dd4bf; }
        .price-change.down { color: #ff4d6d; }

        .metric-label {
            font-size: 0.72rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .metric-value {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .candle-wrap {
            margin-top: 2px;
            border-radius: 12px;
            padding: 6px;
            background: rgba(255,255,255,0.04);
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .candle-wrap:hover {
            background: rgba(255,255,255,0.08);
        }

        .card-controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            margin-top: auto;
            justify-content: space-between;
        }

        .card-amount {
            width: clamp(64px, 5.6vw, 74px);
            border: 1px solid var(--border);
            border-radius: 10px;
            background: rgba(255,255,255,0.04);
            color: var(--text);
            padding: 8px 10px;
            outline: none;
            appearance: none;
            font-size: 0.9rem;
        }

        .action-btn {
            padding: clamp(7px, 0.8vw, 8px) clamp(10px, 1vw, 12px);
            border-radius: 999px;
            font-size: clamp(0.8rem, 0.85vw, 0.9rem);
        }

        .insights {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 20px;
        }

        .insight-card {
            padding: 20px 22px;
        }

        .insight-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .portfolio-wrap,
        .log-wrap {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .folio-row,
        .log-row {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .empty-state {
            color: var(--muted);
            padding: 10px 0;
        }

        @media (max-width: 900px) {
            .asset-grid {
                grid-template-columns: repeat(auto-fit, minmax(min(100%, 220px), 1fr));
            }
        }

        @media (max-width: 640px) {
            body { padding: 16px; }
            .topbar { flex-direction: column; align-items: flex-start; }
            .asset-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <div class="cash-pill">
                <strong class="cash-value" id="balance">0 руб.</strong>
                <span class="secondary" id="totalState">Общее состояние: 0 руб.</span>
            </div>
            <div class="day-pill" id="day">День 1 / 365</div>
            <button class="btn btn-primary" id="nextDay">Следующий день</button>
            <button class="btn btn-muted" id="reset">Сброс</button>
        </header>

        <main class="content">
            <section class="asset-section">
                <div class="asset-grid" id="marketCards"></div>
            </section>
        </main>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
