<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инвестиционный симулятор</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #07111f;
            --panel: rgba(10, 19, 34, 0.9);
            --panel-2: rgba(17, 30, 54, 0.95);
            --border: rgba(255,255,255,0.08);
            --text: #f4f6fb;
            --muted: #8fa0bd;
            --accent: #3b82f6;
            --accent-2: #2dd4bf;
            --danger: #ff4d6d;
            --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top left, #14345d 0%, var(--bg) 42%, #050b14 100%);
            padding: 24px;
        }

        .app-shell {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 20px 24px;
            border: 1px solid var(--border);
            border-radius: 24px;
            background: var(--panel);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }

        .cash-pill {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .label {
            font-size: 0.76rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .cash-value {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .secondary {
            color: var(--muted);
            font-size: 0.95rem;
        }

        .btn {
            border: none;
            border-radius: 999px;
            padding: 10px 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            color: white;
            background: linear-gradient(135deg, var(--accent), #5b93ff);
            box-shadow: 0 12px 24px rgba(59, 130, 246, 0.28);
        }

        .btn-secondary {
            color: var(--text);
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
        }

        .btn-muted {
            color: var(--muted);
            background: transparent;
            border: 1px solid var(--border);
        }

        .market-section,
        .trade-panel,
        .insight-card {
            border: 1px solid var(--border);
            border-radius: 24px;
            background: var(--panel);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
        }

        .market-section { padding: 24px; }

        .market-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            gap: 12px;
        }

        .market-header h2 {
            margin: 0 0 4px;
            font-size: 1.15rem;
        }

        .market-header p {
            margin: 0;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .day-pill {
            color: var(--muted);
            font-size: 0.95rem;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255,255,255,0.05);
        }

        .market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        .instrument-card {
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(45,212,191,0.08));
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .instrument-card:hover {
            transform: translateY(-2px);
            border-color: rgba(59,130,246,0.35);
        }

        .instrument-head {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            align-items: flex-start;
        }

        .instrument-name {
            font-size: 1rem;
            font-weight: 700;
        }

        .instrument-ticker {
            margin-top: 2px;
            font-size: 0.78rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .instrument-pill {
            font-size: 0.77rem;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(255,255,255,0.07);
            color: var(--muted);
            white-space: nowrap;
        }

        .instrument-metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .metric-label {
            font-size: 0.74rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .metric-value {
            font-size: 0.98rem;
            font-weight: 600;
        }

        .instrument-footer {
            margin-top: auto;
            display: flex;
            justify-content: flex-end;
        }

        .chip-btn {
            border: none;
            border-radius: 999px;
            background: rgba(255,255,255,0.08);
            color: var(--text);
            padding: 8px 12px;
            cursor: pointer;
        }

        .trade-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 20px 24px;
        }

        .trade-fields {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .trade-fields label {
            display: flex;
            flex-direction: column;
            gap: 6px;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .trade-fields input {
            min-width: 120px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: rgba(255,255,255,0.04);
            color: var(--text);
            padding: 10px 12px;
            outline: none;
        }

        .trade-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .insights {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 20px;
        }

        .insight-card {
            padding: 20px 22px;
        }

        .insight-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .portfolio-wrap,
        .log-wrap {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .folio-row,
        .log-row {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .empty-state {
            color: var(--muted);
            padding: 10px 0;
        }

        @media (max-width: 900px) {
            .insights { grid-template-columns: 1fr; }
        }

        @media (max-width: 640px) {
            body { padding: 16px; }
            .topbar, .trade-panel { flex-direction: column; align-items: flex-start; }
            .market-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <div class="cash-pill">
                <span class="label">Наличные</span>
                <strong class="cash-value" id="balance">0 руб.</strong>
                <span class="secondary" id="totalState">Общее состояние: 0 руб.</span>
            </div>
            <button class="btn btn-primary" id="continue">Продолжить</button>
        </header>

        <main class="content">
            <section class="market-section">
                <div class="market-header">
                    <div>
                        <h2>Рынок</h2>
                        <p>Выбор инструментов и текущая оценка позиции</p>
                    </div>
                    <div class="day-pill" id="day">День 1 / 365</div>
                </div>
                <div class="market-grid" id="marketCards"></div>
            </section>

            <section class="trade-panel">
                <div class="trade-fields">
                    <label>
                        Тикер
                        <input type="text" id="tickerInput" placeholder="SBER" maxlength="10">
                    </label>
                    <label>
                        Количество
                        <input type="number" id="amountInput" placeholder="10" min="1" value="10">
                    </label>
                </div>
                <div class="trade-actions">
                    <button class="btn btn-secondary" id="buy">Купить</button>
                    <button class="btn btn-muted" id="sell">Продать</button>
                    <button class="btn btn-primary" id="nextDay">Следующий день</button>
                    <button class="btn btn-muted" id="reset">Сброс</button>
                </div>
            </section>

            <section class="insights">
                <article class="insight-card">
                    <div class="insight-title">Портфель</div>
                    <div id="portfolio" class="portfolio-wrap"></div>
                </article>
                <article class="insight-card">
                    <div class="insight-title">История</div>
                    <div id="log" class="log-wrap"></div>
                </article>
            </section>
        </main>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
